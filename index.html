<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Permissions Policy en meta tag.
      Edge lit ce header EN PLUS des headers HTTP de vite.config.js.
      lazyload=()  → on gère le lazy loading nous-mêmes (LazyImage.jsx)
      unload=()    → event déprécié, on ne l'utilise pas
    -->
    <meta
      http-equiv="Permissions-Policy"
      content="unload=(), camera=(), microphone=(), geolocation=()"
    />

    <link rel="icon" type="image/png" href="/graphweb_rose-transparent" />

    <meta
      name="description"
      content="Portfolio de Stéphanie COUPAMA — Développeuse React et WordPress, La Réunion."
    />
    <meta name="author" content="Stéphanie COUPAMA — By Fri'MouSs" />

    <meta property="og:title" content="Stéphanie COUPAMA — Portfolio" />
    <meta
      property="og:description"
      content="Développeuse React et WordPress basée à La Réunion."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://portfolio-graphweb.vercel.app/" />

    <title>Portfolio de Stéphanie — By Fri'MouSs</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
